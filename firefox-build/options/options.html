<!doctype html>
<html lang="en">
  <head>
  <script src="../browser-polyfill.js"></script>
    <meta charset="UTF-8" />
    <title>Commitment Timer — Settings</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #0a0a0f;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #ffffff;
        padding: 40px 20px;
        max-width: 560px;
        margin: 0 auto;
      }
      h1 {
        font-size: 24px;
        font-weight: 800;
        margin-bottom: 6px;
      }
      .sub {
        color: #8888aa;
        font-size: 14px;
        margin-bottom: 32px;
      }
      .section-title {
        font-size: 13px;
        font-weight: 600;
        color: #8888aa;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 12px;
      }
      .site-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 16px;
      }
      .site-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #13131a;
        border: 1px solid #2a2a3a;
        border-radius: 10px;
        padding: 12px 16px;
      }
      .site-name {
        font-size: 15px;
        color: #ccccdd;
      }
      .remove-btn {
        background: none;
        border: none;
        color: #55556a;
        font-size: 18px;
        cursor: pointer;
        line-height: 1;
      }
      .remove-btn:hover {
        color: #ef4444;
      }
      .add-row {
        display: flex;
        gap: 8px;
      }
      .add-input {
        flex: 1;
        background: #1e1e2e;
        border: 1px solid #2a2a3a;
        border-radius: 10px;
        color: #ffffff;
        font-size: 15px;
        padding: 10px 14px;
        outline: none;
      }
      .add-input:focus {
        border-color: #6366f1;
      }
      .add-btn {
        background: #6366f1;
        border: none;
        border-radius: 10px;
        color: #fff;
        font-size: 15px;
        font-weight: 700;
        padding: 10px 20px;
        cursor: pointer;
      }
      .add-btn:hover {
        background: #4f46e5;
      }
      .saved {
        color: #22c55e;
        font-size: 13px;
        margin-top: 12px;
        display: none;
      }
    </style>
    <script src="../browser-polyfill.js"></script>
  </head>
  <body>
    <h1>⚙️ Settings</h1>
    <p class="sub">Manage your blocked sites</p>

    <p class="section-title">Blocked Sites</p>
    <div class="site-list" id="site-list"></div>

    <div class="add-row">
      <input
        type="text"
        class="add-input"
        id="new-site"
        placeholder="e.g. netflix.com"
      />
      <button class="add-btn" id="add-btn">Add</button>
    </div>
    <div class="saved" id="saved-msg">✅ Saved!</div>

    <script src="options.js"></script>
  </body>
</html>
