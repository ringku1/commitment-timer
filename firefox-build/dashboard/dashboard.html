<!doctype html>
<html lang="en">
  <head>
  <script src="../browser-polyfill.js"></script>
    <meta charset="UTF-8" />
    <title>Commitment Timer — Dashboard</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #070b14;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #ffffff;
        padding: 40px 20px;
        max-width: 700px;
        margin: 0 auto;
      }

      .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 4px;
      }

      .page-header-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      h1 {
        font-size: 28px;
        font-weight: 800;
      }

      .header-btns {
        display: flex;
        gap: 8px;
      }

      .header-btn {
        background: #0d1526;
        border: 1px solid #1a2d4a;
        border-radius: 8px;
        color: #7aa0c0;
        font-size: 12px;
        padding: 7px 14px;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
        white-space: nowrap;
      }
      .header-btn:hover {
        border-color: #0ea5e9;
        color: #ffffff;
        box-shadow: 0 0 10px #0ea5e925;
      }

      .sub {
        color: #7aa0c0;
        font-size: 14px;
        margin-bottom: 32px;
      }

      .top-grid {
        display: grid;
        grid-template-columns: 1fr 2fr;
        gap: 12px;
        margin-bottom: 32px;
      }

      .streak-card {
        background: linear-gradient(135deg, #0a1a30, #0d1526);
        border: 1px solid #0ea5e9;
        border-radius: 12px;
        padding: 24px 20px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        box-shadow:
          0 0 30px #0ea5e920,
          0 0 80px #0ea5e910;
      }
      .streak-fire {
        font-size: 40px;
        margin-bottom: 8px;
      }
      .streak-num {
        font-size: 52px;
        font-weight: 900;
        color: #06b6d4;
        line-height: 1;
        text-shadow: 0 0 30px #06b6d460;
      }
      .streak-label {
        font-size: 13px;
        color: #7aa0c0;
        margin-top: 4px;
      }
      .streak-best {
        font-size: 12px;
        color: #334d6a;
        margin-top: 8px;
      }
      .streak-best span {
        color: #0ea5e9;
        font-weight: 700;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
      }
      .stat-card {
        background: #0d1526;
        border: 1px solid #1a2d4a;
        border-radius: 12px;
        padding: 16px;
        text-align: center;
      }
      .stat-value {
        font-size: 28px;
        font-weight: 800;
        color: #0ea5e9;
        text-shadow: 0 0 12px #0ea5e940;
      }
      .stat-label {
        font-size: 12px;
        color: #7aa0c0;
        margin-top: 4px;
      }

      .honesty-wrap {
        background: #0d1526;
        border: 1px solid #1a2d4a;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 32px;
      }
      .section-title {
        font-size: 13px;
        font-weight: 600;
        color: #334d6a;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 10px;
      }
      .honesty-bar-bg {
        background: #0a1220;
        border-radius: 99px;
        height: 12px;
        overflow: hidden;
        margin-bottom: 8px;
      }
      .honesty-bar {
        background: linear-gradient(90deg, #0369a1, #06b6d4);
        height: 100%;
        border-radius: 99px;
        transition: width 0.8s;
        box-shadow: 0 0 10px #06b6d450;
      }
      .honesty-score {
        font-size: 20px;
        font-weight: 800;
        color: #06b6d4;
        text-shadow: 0 0 16px #06b6d440;
      }

      .calendar-wrap {
        margin-bottom: 32px;
      }
      .calendar {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
      }
      .cal-day {
        width: 30px;
        height: 30px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        color: #334d6a;
        font-weight: 600;
        transition: transform 0.1s;
        cursor: default;
      }
      .cal-day:hover {
        transform: scale(1.2);
      }
      .cal-kept {
        background: #0c3b2e;
        border: 1px solid #10b981;
        color: #10b981;
        box-shadow: 0 0 8px #10b98130;
      }
      .cal-broke {
        background: #2a0a0a;
        border: 1px solid #ef4444;
        color: #ef4444;
        box-shadow: 0 0 8px #ef444430;
      }
      .cal-empty {
        background: #0d1526;
        border: 1px solid #1a2d4a;
      }

      .cal-legend {
        display: flex;
        gap: 16px;
        margin-top: 10px;
        margin-bottom: 32px;
      }
      .cal-legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #334d6a;
      }
      .cal-legend-dot {
        width: 10px;
        height: 10px;
        border-radius: 3px;
      }

      .sessions-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .btn-clear {
        background: #1a0a0a;
        border: 1px solid #ef444460;
        border-radius: 8px;
        color: #ef4444;
        font-size: 12px;
        padding: 6px 14px;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
      }
      .btn-clear:hover {
        border-color: #ef4444;
        box-shadow: 0 0 12px #ef444430;
        background: #2a0a0a;
      }

      .session-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .session-card {
        background: #0d1526;
        border: 1px solid #1a2d4a;
        border-radius: 12px;
        padding: 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        transition: border-color 0.2s;
      }
      .session-card:hover {
        border-color: #0ea5e9;
      }
      .session-left {
        flex: 1;
      }
      .session-site {
        font-size: 12px;
        color: #334d6a;
        margin-bottom: 4px;
      }
      .session-intention {
        font-size: 14px;
        color: #c0d8f0;
      }
      .session-right {
        text-align: right;
        flex-shrink: 0;
      }
      .session-time {
        font-size: 12px;
        color: #334d6a;
        margin-bottom: 4px;
      }
      .session-badge {
        font-size: 11px;
        font-weight: 700;
        padding: 3px 10px;
        border-radius: 99px;
        display: inline-block;
      }
      .badge-kept {
        background: #0c3b2e;
        border: 1px solid #10b981;
        color: #10b981;
      }
      .badge-broke {
        background: #2a0a0a;
        border: 1px solid #ef4444;
        color: #ef4444;
      }
      .session-snooze {
        font-size: 11px;
        color: #334d6a;
        margin-top: 3px;
      }

      .empty-state {
        text-align: center;
        padding: 60px 20px;
        background: #0d1526;
        border: 1px dashed #1a2d4a;
        border-radius: 16px;
      }
      .empty-icon {
        font-size: 48px;
        margin-bottom: 16px;
        filter: drop-shadow(0 0 12px #0ea5e940);
      }
      .empty-title {
        font-size: 18px;
        font-weight: 700;
        color: #ffffff;
        margin-bottom: 8px;
      }
      .empty-text {
        font-size: 14px;
        color: #334d6a;
        line-height: 1.6;
      }
      .empty-text strong {
        color: #06b6d4;
      }

      .confirm-overlay {
        position: fixed;
        inset: 0;
        background: rgba(7, 11, 20, 0.9);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      .confirm-box {
        background: #0d1526;
        border: 1px solid #ef4444;
        border-radius: 16px;
        padding: 32px;
        max-width: 380px;
        width: 100%;
        text-align: center;
        box-shadow: 0 0 30px #ef444430;
      }
      .confirm-icon {
        font-size: 40px;
        margin-bottom: 12px;
      }
      .confirm-title {
        font-size: 20px;
        font-weight: 800;
        color: #fff;
        margin-bottom: 8px;
      }
      .confirm-text {
        font-size: 14px;
        color: #7aa0c0;
        margin-bottom: 24px;
        line-height: 1.6;
      }
      .confirm-buttons {
        display: flex;
        gap: 10px;
      }
      .confirm-cancel {
        flex: 1;
        background: #0a1220;
        border: 1px solid #1a2d4a;
        border-radius: 10px;
        color: #7aa0c0;
        font-size: 14px;
        padding: 12px;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
      }
      .confirm-cancel:hover {
        border-color: #0ea5e9;
        color: #fff;
      }
      .confirm-delete {
        flex: 1;
        background: #450a0a;
        border: 1px solid #ef4444;
        border-radius: 10px;
        color: #fff;
        font-size: 14px;
        font-weight: 700;
        padding: 12px;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
        box-shadow: 0 0 16px #ef444430;
      }
      .confirm-delete:hover {
        background: #7f1d1d;
        box-shadow: 0 0 24px #ef444450;
      }
    </style>
  </head>
  <body>
    <div class="page-header">
      <div class="page-header-left">
        <h1>📊 Dashboard</h1>
      </div>
      <div class="header-btns">
        <button class="header-btn" id="btn-settings">⚙️ Settings</button>
        <button class="header-btn" id="btn-close">✕ Close</button>
      </div>
    </div>
    <p class="sub">Your commitment history</p>

    <div class="top-grid">
      <div class="streak-card">
        <div class="streak-fire" id="streak-emoji">💤</div>
        <div class="streak-num" id="streak-num">0</div>
        <div class="streak-label">day streak</div>
        <div class="streak-best">
          Best: <span id="best-streak">0</span> days
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="total">0</div>
          <div class="stat-label">Sessions</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="kept">0</div>
          <div class="stat-label">Kept</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="score">0%</div>
          <div class="stat-label">Honesty</div>
        </div>
      </div>
    </div>

    <div class="honesty-wrap">
      <p class="section-title">Overall Honesty</p>
      <div class="honesty-bar-bg">
        <div class="honesty-bar" id="honesty-bar" style="width: 0%"></div>
      </div>
      <div class="honesty-score" id="honesty-label">0% follow-through</div>
    </div>

    <div class="calendar-wrap">
      <p class="section-title">Last 30 Days</p>
      <div class="calendar" id="calendar"></div>
      <div class="cal-legend">
        <div class="cal-legend-item">
          <div
            class="cal-legend-dot"
            style="background: #0c3b2e; border: 1px solid #10b981"
          ></div>
          Kept promise
        </div>
        <div class="cal-legend-item">
          <div
            class="cal-legend-dot"
            style="background: #2a0a0a; border: 1px solid #ef4444"
          ></div>
          Broke promise
        </div>
        <div class="cal-legend-item">
          <div
            class="cal-legend-dot"
            style="background: #0d1526; border: 1px solid #1a2d4a"
          ></div>
          No session
        </div>
      </div>
    </div>

    <div class="sessions-header">
      <p class="section-title" style="margin: 0">Recent Sessions</p>
      <button class="btn-clear" id="btn-clear">🗑 Clear History</button>
    </div>

    <div class="session-list" id="session-list"></div>

    <script src="dashboard.js"></script>
  </body>
</html>
