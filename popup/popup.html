<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        width: 280px;
        background: #070b14;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #ffffff;
        padding: 20px;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 20px;
      }
      .header-icon {
        font-size: 24px;
        filter: drop-shadow(0 0 8px #0ea5e9);
      }
      .header-title {
        font-size: 16px;
        font-weight: 700;
      }
      .header-sub {
        font-size: 12px;
        color: #7aa0c0;
      }

      .streak-box {
        background: linear-gradient(135deg, #0a1a30, #0d1526);
        border: 1px solid #0ea5e9;
        border-radius: 12px;
        padding: 16px;
        text-align: center;
        margin-bottom: 12px;
        box-shadow:
          0 0 20px #0ea5e925,
          0 0 60px #0ea5e910;
      }
      .streak-fire {
        font-size: 32px;
        margin-bottom: 4px;
      }
      .streak-number {
        font-size: 36px;
        font-weight: 900;
        color: #06b6d4;
        line-height: 1;
        text-shadow: 0 0 20px #06b6d460;
      }
      .streak-label {
        font-size: 12px;
        color: #7aa0c0;
        margin-top: 4px;
      }
      .streak-best {
        font-size: 11px;
        color: #334d6a;
        margin-top: 6px;
      }
      .streak-best span {
        color: #0ea5e9;
      }

      .stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 12px;
      }
      .stat-box {
        background: #0d1526;
        border: 1px solid #1a2d4a;
        border-radius: 10px;
        padding: 12px;
        text-align: center;
      }
      .stat-value {
        font-size: 22px;
        font-weight: 800;
        color: #0ea5e9;
        text-shadow: 0 0 10px #0ea5e940;
      }
      .stat-label {
        font-size: 11px;
        color: #7aa0c0;
        margin-top: 2px;
      }

      .honesty {
        background: #0d1526;
        border: 1px solid #1a2d4a;
        border-radius: 10px;
        padding: 14px;
        margin-bottom: 12px;
      }
      .honesty-label {
        font-size: 12px;
        color: #7aa0c0;
        margin-bottom: 8px;
      }
      .honesty-bar-bg {
        background: #0a1220;
        border-radius: 99px;
        height: 8px;
        overflow: hidden;
      }
      .honesty-bar {
        background: linear-gradient(90deg, #0369a1, #06b6d4);
        height: 100%;
        border-radius: 99px;
        transition: width 0.5s;
        box-shadow: 0 0 8px #06b6d450;
      }
      .honesty-score {
        font-size: 13px;
        color: #06b6d4;
        margin-top: 6px;
        font-weight: 600;
      }

      .btn {
        width: 100%;
        background: #0d1526;
        border: 1px solid #1a2d4a;
        border-radius: 8px;
        color: #7aa0c0;
        font-size: 13px;
        padding: 10px;
        cursor: pointer;
        transition: all 0.2s;
        margin-bottom: 8px;
      }
      .btn:hover {
        border-color: #0ea5e9;
        color: #ffffff;
        box-shadow: 0 0 12px #0ea5e925;
      }

      .honesty {
        background: #13131a;
        border: 1px solid #2a2a3a;
        border-radius: 10px;
        padding: 14px;
        margin-bottom: 12px;
      }
      .honesty-label {
        font-size: 12px;
        color: #8888aa;
        margin-bottom: 8px;
      }
      .honesty-bar-bg {
        background: #1e1e2e;
        border-radius: 99px;
        height: 8px;
        overflow: hidden;
      }
      .honesty-bar {
        background: #6366f1;
        height: 100%;
        border-radius: 99px;
        transition: width 0.5s;
      }
      .honesty-score {
        font-size: 13px;
        color: #a78bfa;
        margin-top: 6px;
        font-weight: 600;
      }

      .btn {
        width: 100%;
        background: #1e1e2e;
        border: 1px solid #2a2a3a;
        border-radius: 8px;
        color: #ccccdd;
        font-size: 13px;
        padding: 10px;
        cursor: pointer;
        transition: all 0.2s;
        margin-bottom: 8px;
      }
      .btn:hover {
        border-color: #6366f1;
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-icon">🔒</div>
      <div>
        <div class="header-title">Commitment Timer</div>
        <div class="header-sub">Stay intentional</div>
      </div>
    </div>

    <div class="streak-box">
      <div class="streak-fire" id="streak-emoji">🔥</div>
      <div class="streak-number" id="streak-number">0</div>
      <div class="streak-label">day streak</div>
      <div class="streak-best">Best: <span id="best-streak">0</span> days</div>
    </div>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-value" id="total-sessions">0</div>
        <div class="stat-label">Total Sessions</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="kept-promises">0</div>
        <div class="stat-label">Kept Promises</div>
      </div>
    </div>

    <div class="honesty">
      <div class="honesty-label">Honesty Score</div>
      <div class="honesty-bar-bg">
        <div class="honesty-bar" id="honesty-bar" style="width: 0%"></div>
      </div>
      <div class="honesty-score" id="honesty-score">0% follow-through</div>
    </div>

    <button class="btn" id="dashboard-btn">📊 View Dashboard</button>
    <button class="btn" id="options-btn">⚙️ Settings</button>

    <script src="popup.js"></script>
  </body>
</html>
